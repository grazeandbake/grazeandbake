<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — Graze &amp; Bake Catering Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Karla:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--terra:#A56940;--terra-dark:#6E4227;--cream:#F2E9E1;--cream-warm:#EADFD3;--display:'Josefin Sans',sans-serif;--body:'Karla',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--terra);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-family:var(--display);font-weight:700;font-size:clamp(2rem,6vw,3.4rem);letter-spacing:.1em;line-height:1.1}
.co{font-family:var(--display);font-weight:300;font-size:.85rem;letter-spacing:.6em;margin-top:.7rem;color:var(--cream-warm);text-indent:.6em}
.rule{width:56px;height:2px;background:var(--cream);opacity:.6;margin:2rem 0 1.6rem}
p{max-width:32rem;font-weight:300;color:var(--cream-warm);line-height:1.7}
p strong{color:var(--cream);font-weight:600}
a.back{font-family:var(--display);font-weight:600;font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;background:var(--cream);color:var(--terra-dark);padding:1rem 2.2rem;border-radius:2px;margin-top:2.2rem;display:inline-block}
a.back:hover{background:#fff}
</style>
</head>
<body>
<h1>THANK YOU.</h1>
<div class="co">GRAZE &amp; BAKE CATERING CO.</div>
<div class="rule"></div>
<p>Your enquiry is on its way to us. <strong>We'll come back to you within 24 hours</strong> with a quote and next steps. In the meantime, have a browse of our recent work on Instagram — we can't wait to hear all about your event. x</p>
<a class="back" href="/">Back to the website</a>
</body>
</html>
